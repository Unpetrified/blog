{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unpetrified | Login</title>
    <link rel="icon" href="{% static 'media\Logo\logo.png' %}">
    <link rel="stylesheet" href="{% static 'css\register.css' %}">
</head>
    <body>
        
        <div class="page-heading">
        
            <a href="/"><img src="static/media/Logo/head.png" alt="logo"></a>
    
        </div>
        
        <form action="login" method="POST">
            {% csrf_token %}

            <div class="register">Login</div>

            {% for message in messages %}

            <div class="password">

                {{message}}

            </div>

            {% endfor %}

            <input type="text" name="username" placeholder="Username" onfocus="focus(this);" onchange="check(this);" onmouseout="out(this);">
            
            <input type="password" name="password" placeholder="Password">

            <input type="submit" value="Login">

            <div class="register-link">Not a member? <a href="register">Register</a></div>

        </form>

        <script src="{% static 'js\index.js' %}"></script>
    </body>  
</html>

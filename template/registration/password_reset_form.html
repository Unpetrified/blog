{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinger | Reset Password</title>
    <link rel="icon" href="{% static 'media\Logo\logo.png' %}">
    <link rel="stylesheet" href="{% static 'css\register.css' %}">
</head>
    <body>
        <header>
            <div id="header">
                <a href="/"><img src="{% static 'media\Logo\head.png' %}" alt="kinger" id="img-header"></a>
            </div>
            
            <div id="motto">
                ...tech is for the disciplined and strong-willed
            </div>
        </header>
        
        <form action="." method="POST">
            {{ form.as_p }}
            {% csrf_token %}

            <div class="register">Request Password Reset</div>

            <input type="email" name="email" placeholder="Enter your email address">

            {% for message in messages %}

            <div class="password">

                {{message}}
            
            </div>

            {% endfor %}

            <input type="submit" value="Reset">

            <div class="register-link">Not a member? <a href="register">Register</a></div>
            
        </form>

        <script src="{% static 'js\index.js' %}"></script>
    </body>  
</html>
